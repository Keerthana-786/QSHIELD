version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: qshield_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-qshield}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-qshield_secure_pass}
      POSTGRES_DB: ${POSTGRES_DB:-qshield_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qshield"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: qshield_redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: qshield_backend
    restart: always
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-qshield}:${POSTGRES_PASSWORD:-qshield_secure_pass}@db:5432/${POSTGRES_DB:-qshield_db}
      - REDIS_URL=redis://redis:6379
      - AMD_ROCM_ENABLED=${AMD_ROCM_ENABLED:-false}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - model_cache:/app/models/cache
    # AMD GPU support - uncomment for ROCm-enabled hosts
    # devices:
    #   - /dev/kfd
    #   - /dev/dri
    # group_add:
    #   - video
    #   - render

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: qshield_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      - REACT_APP_API_URL=http://localhost:8000

  nginx:
    image: nginx:alpine
    container_name: qshield_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  model_cache:
